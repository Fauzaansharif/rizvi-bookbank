<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up - Rizvi Book Bank</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <i class="fas fa-book-reader"></i> Rizvi Book Bank
        </div>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="books.html">Books</a></li>
          <li><a href="teacher-books.html">Teachers</a></li>
          <li><a href="question-papers.html">Papers</a></li>
          <li><a href="signup.html">Sign Up</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="form-container hidden">
        <h2
          style="
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-color);
          "
        >
          Create an Account
        </h2>
        <form>
          <div class="form-group">
            <label for="name"><i class="fas fa-user"></i> Full Name</label>
            <input
              type="text"
              id="name"
              required
              placeholder="Enter your name"
            />
          </div>
          <div class="form-group">
            <label for="email"
              ><i class="fas fa-envelope"></i> Email Address</label
            >
            <input
              type="email"
              id="email"
              required
              placeholder="Enter your email"
            />
          </div>
          <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> Password</label>
            <input
              type="password"
              id="password"
              required
              placeholder="Create a password"
            />
          </div>
          <div class="form-group">
            <label for="branch"><i class="fas fa-university"></i> Branch</label>
            <input type="text" id="branch" placeholder="e.g. ECS, CS, Civil" />
          </div>
          <button type="submit" class="btn" style="width: 100%">Sign Up</button>
        </form>
      </div>
    </main>

    <footer>
      <p>&copy; 2025 Rizvi Book Bank.</p>
      <p>Built by Fauzaan, Rehan, Hasan and Saad</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
